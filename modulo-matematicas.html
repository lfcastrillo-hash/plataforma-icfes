<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Módulo</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/modulos.css" />
  </head>
  <body>
    <header class="navbar">
      <h1 id="tituloModulo">Módulo</h1>
      <a href="dashboard-estudiante.html">Volver</a>
    </header>

    <main class="module-container" id="contenidoModulo">
      <!-- Aquí se carga dinámicamente -->
    </main>

    <button class="chat-btn" onclick="abrirChat()">IA</button>

    <script src="js/progreso.js"></script>
    <script src="js/chat-ia.js"></script>

    <script>
      const params = new URLSearchParams(window.location.search);
      const area = params.get("area");

      const titulo = document.getElementById("tituloModulo");
      const contenido = document.getElementById("contenidoModulo");

      if (area === "matematicas") {
        titulo.textContent = "Matemáticas";

        contenido.innerHTML = `
        <div class="topic-card">
          <h2>Álgebra</h2>
          <p>Aprende ecuaciones y operaciones básicas.</p>
          <button onclick="marcarTema(this)">Marcar completado</button>
        </div>

        <div class="topic-card">
          <h2>Geometría</h2>
          <p>Figuras, áreas y perímetros.</p>
          <button onclick="marcarTema(this)">Marcar completado</button>
        </div>

        <div class="topic-card">
          <h2>Estadística</h2>
          <p>Gráficas y análisis de datos.</p>
          <button onclick="marcarTema(this)">Marcar completado</button>
        </div>

        <div class="topic-card reto">
          <h2>Mini Reto</h2>
          <p>¿Cuánto es 2x + 3 si x = 4?</p>
          <button>11</button>
          <button>8</button>
          <button>5</button>
        </div>
      `;
      } else {
        titulo.textContent = "Módulo en construcción";

        contenido.innerHTML = `
        <div class="topic-card">
          <h2>Prototipo no funcional</h2>
          <p>Este módulo aún no está disponible en esta versión del sistema.</p>
          <p>Actualmente solo el módulo de Matemáticas está implementado para demostración.</p>
        </div>
      `;
      }
    </script>
  </body>
</html>
