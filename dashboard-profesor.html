<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Profesor</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <header class="navbar">
      <h1>Panel del Profesor</h1>
      <a href="index.html">Cerrar sesión</a>
    </header>

    <main class="dashboard">
      <section class="welcome-box">
        <h2>Clase Activa</h2>
        <p>Código de ingreso:</p>
        <h3 id="codigoClase">ICFES-2026</h3>
        <a class="btn" href="clases.html">Gestionar Clases</a>
      </section>

      <section class="table-box">
        <h2>Progreso de estudiantes</h2>

        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Área</th>
              <th>Progreso</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Ana</td>
              <td>Matemáticas</td>
              <td>80%</td>
            </tr>
            <tr>
              <td>Carlos</td>
              <td>Inglés</td>
              <td>55%</td>
            </tr>
            <tr>
              <td>Sofía</td>
              <td>Lectura Crítica</td>
              <td>70%</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
