<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Profesor</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <header class="navbar">
      <h1>Panel del Profesor</h1>
      <a href="index.html">Cerrar sesión</a>
    </header>

    <main class="dashboard">
      <section class="welcome-box">
        <h2>Ranking de estudiantes</h2>
        <p>Ordenados por progreso en Matemáticas</p>
      </section>

      <section class="table-box">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Progreso</th>
            </tr>
          </thead>
          <tbody id="tablaEstudiantes"></tbody>
        </table>
      </section>
    </main>

    <script>
      const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

      const estudiantes = usuarios
        .filter((u) => u.rol === "estudiante")
        .map((u) => {
          const progreso =
            JSON.parse(
              localStorage.getItem("progresoMatematicas_" + u.correo),
            ) || 0;

          return {
            ...u,
            progreso,
          };
        });

      
      estudiantes.sort((a, b) => b.progreso - a.progreso);

      const tabla = document.getElementById("tablaEstudiantes");

      if (estudiantes.length === 0) {
        tabla.innerHTML = `
      <tr>
        <td colspan="4">No hay estudiantes registrados</td>
      </tr>
    `;
      } else {
        estudiantes.forEach((est, index) => {
          const fila = document.createElement("tr");

          fila.innerHTML = `
        <td>${index + 1}</td>
        <td>${est.nombre}</td>
        <td>${est.correo}</td>
        <td>${est.progreso}%</td>
      `;

          tabla.appendChild(fila);
        });
      }
    </script>
  </body>
</html>
