<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Estudiante</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <header class="navbar">
      <h1>Panel del Estudiante</h1>
      <a href="index.html">Cerrar sesión</a>
    </header>

    <main class="dashboard">
      <section class="welcome-box">
        <h2>Bienvenido</h2>
        <p>Tu progreso general:</p>

        <div class="progress-bar">
          <div class="progress" style="width: 45%">45%</div>
        </div>
      </section>

      <section class="cards-section">
        <h2>Áreas de Estudio</h2>

        <div class="cards">
          <a class="card" href="modulo-matematicas.html?area=matematicas"
            >Matemáticas</a
          >
          <a class="card" href="modulo-matematicas.html?area=lectura"
            >Lectura Crítica</a
          >
          <a class="card" href="modulo-matematicas.html?area=ciencias"
            >Ciencias Naturales</a
          >
          <a class="card" href="modulo-matematicas.html?area=sociales"
            >Sociales y Ciudadanas</a
          >
          <a class="card" href="modulo-matematicas.html?area=ingles">Inglés</a>
        </div>
      </section>

      <section class="quick-access">
        <a class="btn" href="cuadernillos.html">Material de Estudio</a>
        <a class="btn" href="simulacro.html">Simulacros</a>
      </section>
    </main>

    <button class="chat-btn" onclick="abrirChat()">IA</button>

    <script src="js/chat-ia.js"></script>

    <script>
      const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

      if (!usuario) {
        window.location.href = "index.html";
      } else {
        document.querySelector(".welcome-box h2").textContent =
          "Bienvenido, " + usuario.nombre;
      }
    </script>
  </body>
</html>
